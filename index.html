<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gestante Health Tracker V3 — Registrar</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <h1>Gestante Health Tracker <span class="badge">V3</span></h1>
    <nav class="topnav">
      <a href="index.html" aria-current="page">Registrar</a>
      <a href="results.html">Resultados</a>
    </nav>
  </header>
  <main class="container">
    <section class="card">
      <h2>Novo Registro</h2>
      <form id="entryForm">
        <label>Nome <input id="nome" required /></label><br>
        <label>Tipo 
          <select id="tipo">
            <option value="pressao">Pressão</option>
            <option value="glicemia">Glicemia</option>
          </select>
        </label><br>
        <div id="pressaoFields">
          <label>PAS <input id="pas" type="number" /></label>
          <label>PAD <input id="pad" type="number" /></label>
          <label>FC <input id="fc" type="number" /></label>
        </div>
        <div id="glicemiaFields" hidden>
          <label>Glicemia (mg/dL) <input id="mgdl" type="number" /></label>
          <label>Contexto 
            <select id="ctx">
              <option value="jejum">Jejum</option>
              <option value="pos-prandial">Pós-prandial</option>
              <option value="casual">Casual</option>
              <option value="ao-deitar">Ao deitar</option>
            </select>
          </label>
        </div>
        <label>Observações <input id="obs" /></label><br>
        <button type="submit">Salvar</button>
      </form>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
