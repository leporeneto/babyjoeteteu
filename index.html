<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gestante Health Tracker — Registrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-content">
      <div>
        <h1>Gestante Health Tracker</h1>
        <p>Registre Pressão Arterial e Glicemia com um toque. 🌈</p>
      </div>
      <img src="assets/couple.jpg" alt="Casal gestante sorrindo" class="hero-img" onerror="this.style.display='none'"/>
    </div>
    <nav class="topnav container">
      <a href="index.html" aria-current="page">Registrar</a>
      <a href="results.html">Resultados</a>
    </nav>
  </header>

  <main class="container grid">
    <section class="card">
      <h2>Novo Registro</h2>
      <form id="entryForm" autocomplete="off">
        <div class="form-row">
          <label for="nome">Nome</label>
          <input id="nome" name="nome" type="text" placeholder="Ex.: Andressa" required />
        </div>

        <div class="form-row">
          <label for="tipo">Tipo</label>
          <select id="tipo" name="tipo" required>
            <option value="pressao">Pressão Arterial</option>
            <option value="glicemia">Glicemia</option>
          </select>
        </div>

        <div class="form-row" id="valorWrap">
          <label for="valor" id="valorLabel">Valor (mmHg PAS/PAD)</label>
          <input id="valor" name="valor" type="text" placeholder="Ex.: 120/80 ou 95" required />
          <small class="hint" id="valorHint">Para pressão: digite "120/80". Para glicemia: um número em mg/dL.</small>
        </div>

        <div class="form-row">
          <label for="obs">Observações (opcional)</label>
          <input id="obs" name="obs" type="text" placeholder="Jejum, pós-prandial, sentado, braço esquerdo…" />
        </div>

        <div class="form-row inline">
          <div>
            <label>Data & hora</label>
            <input id="datahora" type="datetime-local" />
          </div>
          <div class="now-box">
            <input type="checkbox" id="usarAgora" checked />
            <label for="usarAgora">Usar data/hora de agora</label>
          </div>
        </div>

        <button class="btn primary" type="submit">Salvar registro</button>
      </form>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Últimos registros</h2>
        <div class="actions">
          <button class="btn ghost" id="exportBtn" title="Baixar JSON">Exportar</button>
          <label class="btn ghost filelabel" for="importFile">Importar</label>
          <input id="importFile" type="file" accept="application/json" hidden />
          <button class="btn danger" id="clearBtn" title="Apagar tudo">Limpar</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="table" id="recentTable" aria-describedby="Tabela de últimos registros">
          <thead>
            <tr>
              <th>Data</th>
              <th>Nome</th>
              <th>Tipo</th>
              <th>Valor</th>
              <th>Obs.</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="site-footer container">
    <small>Feito com carinho para acompanhar a gestação 💕 — <a href="results.html">ver resultados</a></small>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
