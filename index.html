<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gestante Health Tracker V3 — Registrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-content">
      <div>
        <h1>Gestante Health Tracker <span class="badge">V3</span></h1>
        <p>Registre Pressão Arterial e Glicemia com integração ao Google Sheets 🌈</p>
      </div>
      <img src="assets/couple.jpg" alt="Casal gestante sorrindo" class="hero-img" onerror="this.style.display='none'"/>
    </div>
    <nav class="topnav container">
      <a href="index.html" aria-current="page">Registrar</a>
      <a href="results.html">Resultados</a>
    </nav>
  </header>

  <main class="container grid">
    <section class="card">
      <h2>Novo Registro</h2>
      <form id="entryForm" autocomplete="off">
        <div class="form-row">
          <label for="nome">Nome</label>
          <input id="nome" name="nome" type="text" placeholder="Ex.: Andressa" required />
        </div>

        <div class="form-row">
          <label for="tipo">Tipo</label>
          <select id="tipo" name="tipo" required>
            <option value="pressao">Pressão Arterial</option>
            <option value="glicemia">Glicemia</option>
          </select>
        </div>

        <div class="form-row" id="pressaoFields">
          <label>PAS <input id="pas" type="number" placeholder="Ex.: 120" /></label>
          <label>PAD <input id="pad" type="number" placeholder="Ex.: 80" /></label>
          <label>FC <input id="fc" type="number" placeholder="Ex.: 75" /></label>
        </div>

        <div id="glicemiaFields" hidden>
          <div class="form-row">
            <label>Glicemia (mg/dL) <input id="mgdl" type="number" /></label>
          </div>
          <div class="form-row">
            <label for="ctx">Contexto</label>
            <select id="ctx">
              <option value="jejum">Jejum</option>
              <option value="pos-prandial">Pós-prandial</option>
              <option value="casual">Casual</option>
              <option value="ao-deitar">Ao deitar</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <label for="obs">Observações (opcional)</label>
          <input id="obs" name="obs" type="text" placeholder="Ex.: Dor de cabeça, tontura…" />
        </div>

        <div class="form-row inline">
          <div>
            <label>Data & hora</label>
            <input id="datahora" type="datetime-local" />
          </div>
          <div class="now-box">
            <input type="checkbox" id="usarAgora" checked />
            <label for="usarAgora">Usar agora</label>
          </div>
        </div>

        <button class="btn primary" type="submit">Salvar registro</button>
      </form>
    </section>
  </main>

  <footer class="site-footer container">
    <small>Feito com carinho 💕 — <a href="results.html">ver resultados</a></small>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
